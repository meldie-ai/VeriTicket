<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f3a5f"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <style>
    .actor   { fill: #fff8e1; stroke: #a3782b; stroke-width: 1.4; }
    .ct      { fill: #e8eef9; stroke: #1f3a5f; stroke-width: 1.6; }
    .token   { fill: #e3f7ec; stroke: #2e7d32; stroke-width: 1.4; }
    .chain   { fill: #f5f5f5; stroke: #555; stroke-width: 1.2; }
    .label   { font-size: 13px; font-weight: 700; fill: #1d1d1d; }
    .small   { font-size: 11px; fill: #1d1d1d; }
    .seq     { fill: none; stroke: #1f3a5f; stroke-width: 1.4; }
    .seqg    { fill: none; stroke: #2e7d32; stroke-width: 1.4; }
    .read    { fill: none; stroke: #777; stroke-width: 1.0; stroke-dasharray: 3 3; }
  </style>

  <!-- ====== Stakeholders (left column) ====== -->
  <rect class="actor" x="40" y="40" width="170" height="50" rx="6"/>
  <text class="label" x="125" y="62" text-anchor="middle">Platform Admin</text>
  <text class="small" x="125" y="78" text-anchor="middle">approve / pause</text>

  <rect class="actor" x="40" y="110" width="170" height="50" rx="6"/>
  <text class="label" x="125" y="132" text-anchor="middle">Event Organiser</text>
  <text class="small" x="125" y="148" text-anchor="middle">createEvent / mintTicket</text>

  <rect class="actor" x="40" y="180" width="170" height="50" rx="6"/>
  <text class="label" x="125" y="202" text-anchor="middle">Attendee (Buyer A)</text>
  <text class="small" x="125" y="218" text-anchor="middle">approve / list / sign</text>

  <rect class="actor" x="40" y="250" width="170" height="50" rx="6"/>
  <text class="label" x="125" y="272" text-anchor="middle">Reseller (Buyer B)</text>
  <text class="small" x="125" y="288" text-anchor="middle">purchaseTicket</text>

  <rect class="actor" x="40" y="320" width="170" height="50" rx="6"/>
  <text class="label" x="125" y="342" text-anchor="middle">Venue Staff</text>
  <text class="small" x="125" y="358" text-anchor="middle">redeemTicket</text>

  <rect class="actor" x="40" y="400" width="170" height="40" rx="6" stroke-dasharray="4 3"/>
  <text class="small" x="125" y="424" text-anchor="middle">Public reader (read-only)</text>

  <!-- ====== Smart Contracts (middle) ====== -->
  <rect class="ct" x="320" y="60" width="380" height="180" rx="10"/>
  <text class="label" x="510" y="88" text-anchor="middle">TicketContract</text>
  <text class="small" x="510" y="104" text-anchor="middle" font-style="italic">ERC-721 + AccessControl + Pausable</text>
  <line x1="340" y1="115" x2="680" y2="115" stroke="#1f3a5f" stroke-opacity="0.35"/>
  <text class="small" x="340" y="135">approveOrganizer / addStaff</text>
  <text class="small" x="340" y="152">createEvent / mintTicket</text>
  <text class="small" x="340" y="169">redeemTicket (ECDSA)</text>
  <text class="small" x="340" y="186">transferFrom (called by market)</text>
  <text class="small" x="340" y="203">maxResalePriceFor / isRedeemed</text>
  <text class="small" x="340" y="220">pause / unpause</text>

  <rect class="ct" x="320" y="280" width="380" height="160" rx="10"/>
  <text class="label" x="510" y="308" text-anchor="middle">TransferContract</text>
  <text class="small" x="510" y="324" text-anchor="middle" font-style="italic">Ownable + Pausable + ReentrancyGuard</text>
  <line x1="340" y1="335" x2="680" y2="335" stroke="#1f3a5f" stroke-opacity="0.35"/>
  <text class="small" x="340" y="355">listTicket(price)</text>
  <text class="small" x="340" y="372">cancelListing</text>
  <text class="small" x="340" y="389">purchaseTicket  (atomic):</text>
  <text class="small" x="356" y="406">USDC.transferFrom + Tickets.transferFrom</text>
  <text class="small" x="340" y="423">getActiveListing</text>

  <!-- ====== USDC (right) ====== -->
  <rect class="token" x="800" y="280" width="240" height="120" rx="10"/>
  <text class="label" x="920" y="310" text-anchor="middle">USDC (ERC-20)</text>
  <text class="small" x="920" y="326" text-anchor="middle" font-style="italic">6 decimals - stablecoin</text>
  <line x1="820" y1="338" x2="1020" y2="338" stroke="#2e7d32" stroke-opacity="0.35"/>
  <text class="small" x="820" y="358">approve(spender, amount)</text>
  <text class="small" x="820" y="375">transferFrom(from, to, amount)</text>

  <!-- ====== Chain layer ====== -->
  <rect class="chain" x="320" y="490" width="720" height="60" rx="8"/>
  <text class="label" x="680" y="512" text-anchor="middle">Polygon PoS  -  EVM</text>
  <text class="small" x="680" y="530" text-anchor="middle">deployed contracts + transactions are public on amoy.polygonscan.com</text>

  <!-- ====== Arrows: stakeholders -> contracts ====== -->
  <line x1="210" y1="65" x2="320" y2="100" class="seq" marker-end="url(#arr)"/>
  <line x1="210" y1="135" x2="320" y2="150" class="seq" marker-end="url(#arr)"/>
  <line x1="210" y1="205" x2="320" y2="180" class="seq" marker-end="url(#arr)"/>
  <line x1="210" y1="275" x2="320" y2="320" class="seq" marker-end="url(#arr)"/>
  <line x1="210" y1="345" x2="320" y2="170" class="seq" marker-end="url(#arr)"/>
  <line x1="210" y1="420" x2="320" y2="210" class="read" marker-end="url(#arr)"/>

  <!-- TicketContract -> Buyer A (NFT delivery) -->
  <line x1="320" y1="200" x2="210" y2="195" class="seqg" marker-end="url(#arrG)"/>
  <text class="small" x="225" y="178" fill="#2e7d32">NFT minted</text>

  <!-- Inter-contract: TransferContract -> TicketContract -->
  <line x1="510" y1="280" x2="510" y2="240" class="seq" stroke="#c62828" marker-end="url(#arr)"/>
  <text class="small" x="520" y="265" fill="#c62828">cross-contract: transferFrom + reads cap</text>

  <!-- TransferContract -> USDC -->
  <line x1="700" y1="380" x2="800" y2="340" class="seqg" marker-end="url(#arrG)"/>
  <text class="small" x="715" y="365" fill="#2e7d32">USDC.transferFrom</text>

  <!-- Contracts -> chain -->
  <line x1="510" y1="440" x2="510" y2="490" class="seq" marker-end="url(#arr)"/>
  <line x1="920" y1="400" x2="920" y2="490" class="seq" marker-end="url(#arr)"/>
</svg>
