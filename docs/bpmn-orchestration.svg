<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="seqArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c2c2c"/>
    </marker>
    <symbol id="dataObject" viewBox="0 0 60 70">
      <path d="M2,2 L42,2 L58,18 L58,68 L2,68 Z" fill="#ffffff" stroke="#2c2c2c" stroke-width="1.2"/>
      <path d="M42,2 L42,18 L58,18" fill="none" stroke="#2c2c2c" stroke-width="1.2"/>
    </symbol>
    <symbol id="dataStore" viewBox="0 0 60 50">
      <path d="M2,8 L2,42 Q2,48 30,48 Q58,48 58,42 L58,8" fill="#ffffff" stroke="#2c2c2c" stroke-width="1.2"/>
      <ellipse cx="30" cy="8" rx="28" ry="6" fill="#ffffff" stroke="#2c2c2c" stroke-width="1.2"/>
      <ellipse cx="30" cy="14" rx="28" ry="6" fill="none" stroke="#2c2c2c" stroke-width="0.8"/>
    </symbol>
  </defs>

  <style>
    .poolBg    { fill: #fbfcfe; stroke: #1f3a5f; stroke-width: 1.6; }
    .laneBar   { fill: #e8eef9; stroke: #1f3a5f; stroke-width: 1.2; }
    .laneLabel { font-weight: 700; font-size: 12px; fill: #1f3a5f; }
    .service   { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.4; }
    .taskText  { font-size: 10.5px; fill: #1d1d1d; }
    .dataLabel { font-size: 9.5px; fill: #1d1d1d; }
    .seqFlow   { fill: none; stroke: #2c2c2c; stroke-width: 1.4; }
    .dataAssoc { fill: none; stroke: #2c2c2c; stroke-width: 1.0; stroke-dasharray: 2 3; }
    .gw        { fill: #fffde7; stroke: #b58a00; stroke-width: 1.5; }
    .ev        { fill: #ffffff; stroke: #2c2c2c; stroke-width: 1.6; }
    .evEnd     { fill: #ffffff; stroke: #2c2c2c; stroke-width: 3; }
  </style>

  <!-- Single pool with two lanes -->
  <rect class="poolBg" x="30" y="20" width="1440" height="540"/>
  <rect class="laneBar" x="30" y="20" width="30" height="540"/>
  <text class="laneLabel" x="48" y="305" transform="rotate(-90 48 305)" text-anchor="middle">VeriTicket Smart Contracts</text>

  <!-- Lane 1: TicketContract -->
  <rect class="laneBar" x="60" y="20" width="120" height="260"/>
  <text class="laneLabel" x="120" y="150" text-anchor="middle">TicketContract</text>

  <!-- Lane 2: TransferContract -->
  <rect class="laneBar" x="60" y="280" width="120" height="280"/>
  <text class="laneLabel" x="120" y="420" text-anchor="middle">TransferContract</text>

  <line x1="180" y1="280" x2="1470" y2="280" stroke="#1f3a5f" stroke-width="1.0"/>

  <!-- TicketContract activities -->
  <circle class="ev" cx="220" cy="85" r="14"/>
  <text class="taskText" x="220" y="116" text-anchor="middle">createEvent</text>
  <text class="taskText" x="220" y="128" text-anchor="middle">received</text>

  <rect class="service" x="270" y="65" width="130" height="42" rx="6"/>
  <text class="taskText" x="335" y="82" text-anchor="middle">Persist event;</text>
  <text class="taskText" x="335" y="96" text-anchor="middle">store cap, supply,</text>
  <text class="taskText" x="335" y="108" text-anchor="middle">perWalletLimit</text>

  <rect class="service" x="430" y="65" width="130" height="42" rx="6"/>
  <text class="taskText" x="495" y="82" text-anchor="middle">Mint ticket NFT;</text>
  <text class="taskText" x="495" y="96" text-anchor="middle">enforce per-wallet</text>
  <text class="taskText" x="495" y="108" text-anchor="middle">cap; record owner</text>

  <rect class="service" x="590" y="65" width="120" height="42" rx="6"/>
  <text class="taskText" x="650" y="82" text-anchor="middle">Wait for owner</text>
  <text class="taskText" x="650" y="96" text-anchor="middle">action (held in</text>
  <text class="taskText" x="650" y="108" text-anchor="middle">wallet)</text>

  <polygon class="gw" points="765,86 790,61 815,86 790,111"/>
  <text class="taskText" x="790" y="89" text-anchor="middle">resell?</text>

  <text class="taskText" x="830" y="50" font-size="9.5">no</text>

  <rect class="service" x="1080" y="65" width="140" height="42" rx="6"/>
  <text class="taskText" x="1150" y="82" text-anchor="middle">Verify owner</text>
  <text class="taskText" x="1150" y="96" text-anchor="middle">signature on</text>
  <text class="taskText" x="1150" y="108" text-anchor="middle">redeemTicket</text>

  <rect class="service" x="1240" y="65" width="130" height="42" rx="6"/>
  <text class="taskText" x="1305" y="82" text-anchor="middle">Mark ticket</text>
  <text class="taskText" x="1305" y="96" text-anchor="middle">redeemed;</text>
  <text class="taskText" x="1305" y="108" text-anchor="middle">lock NFT</text>

  <circle class="evEnd" cx="1410" cy="86" r="14"/>
  <text class="taskText" x="1410" y="118" text-anchor="middle">attended</text>

  <path class="seqFlow" d="M 234 85 L 270 85" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 400 85 L 430 85" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 560 85 L 590 85" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 710 85 L 765 85" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 815 85 L 1080 85" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 1220 85 L 1240 85" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 1370 85 L 1395 85" marker-end="url(#seqArrow)"/>

  <!-- Data store: Events -->
  <use href="#dataStore" x="280" y="195" width="60" height="42"/>
  <text class="dataLabel" x="310" y="252" text-anchor="middle">Events</text>
  <path class="dataAssoc" d="M 335 107 L 335 195"/>

  <!-- Data store: Tickets -->
  <use href="#dataStore" x="600" y="195" width="60" height="42"/>
  <text class="dataLabel" x="630" y="252" text-anchor="middle">Tickets</text>
  <path class="dataAssoc" d="M 495 107 L 630 195"/>
  <path class="dataAssoc" d="M 1305 107 L 660 237"/>

  <!-- Data object: Ticket NFT -->
  <use href="#dataObject" x="475" y="0" width="34" height="40"/>
  <text class="dataLabel" x="492" y="50" text-anchor="middle">Ticket</text>
  <text class="dataLabel" x="492" y="60" text-anchor="middle">NFT</text>
  <path class="dataAssoc" d="M 492 40 L 492 65"/>

  <!-- Data object: Signed nonce -->
  <use href="#dataObject" x="1115" y="0" width="34" height="40"/>
  <text class="dataLabel" x="1132" y="50" text-anchor="middle">Signed</text>
  <text class="dataLabel" x="1132" y="60" text-anchor="middle">nonce</text>
  <path class="dataAssoc" d="M 1132 40 L 1132 65"/>

  <!-- TransferContract activities -->
  <text class="taskText" x="800" y="145" font-size="9.5">yes</text>
  <path class="seqFlow" d="M 790 111 L 790 330" marker-end="url(#seqArrow)"/>

  <rect class="service" x="245" y="330" width="130" height="42" rx="6"/>
  <text class="taskText" x="310" y="347" text-anchor="middle">Receive</text>
  <text class="taskText" x="310" y="361" text-anchor="middle">listTicket(price)</text>

  <rect class="service" x="405" y="330" width="140" height="42" rx="6"/>
  <text class="taskText" x="475" y="347" text-anchor="middle">Read cap from Tickets;</text>
  <text class="taskText" x="475" y="361" text-anchor="middle">validate &amp; record listing</text>

  <rect class="service" x="575" y="330" width="120" height="42" rx="6"/>
  <text class="taskText" x="635" y="347" text-anchor="middle">Wait for buyer</text>
  <text class="taskText" x="635" y="361" text-anchor="middle">to call purchase</text>

  <rect class="service" x="725" y="330" width="160" height="42" rx="6"/>
  <text class="taskText" x="805" y="347" text-anchor="middle">Atomic settle:</text>
  <text class="taskText" x="805" y="361" text-anchor="middle">USDC.transferFrom +</text>
  <text class="taskText" x="805" y="373" text-anchor="middle">Tickets.transferFrom</text>

  <rect class="service" x="915" y="330" width="140" height="42" rx="6"/>
  <text class="taskText" x="985" y="347" text-anchor="middle">Clear listing;</text>
  <text class="taskText" x="985" y="361" text-anchor="middle">emit TicketPurchased</text>

  <path class="seqFlow" d="M 790 330 L 790 310 L 310 310 L 310 330" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 375 351 L 405 351" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 545 351 L 575 351" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 695 351 L 725 351" marker-end="url(#seqArrow)"/>
  <path class="seqFlow" d="M 885 351 L 915 351" marker-end="url(#seqArrow)"/>

  <!-- Cross-contract sequence flow -->
  <path class="seqFlow" d="M 805 330 L 805 145 L 1080 145 L 1080 107" marker-end="url(#seqArrow)" stroke="#c62828"/>

  <!-- Loop back to redemption -->
  <path class="seqFlow" d="M 985 330 L 985 190 L 1080 190 L 1080 107" marker-end="url(#seqArrow)"/>

  <!-- Listings data store -->
  <use href="#dataStore" x="450" y="415" width="60" height="42"/>
  <text class="dataLabel" x="480" y="472" text-anchor="middle">Listings</text>
  <path class="dataAssoc" d="M 475 372 L 480 415"/>
  <path class="dataAssoc" d="M 985 372 L 510 437"/>

  <!-- Listing data object -->
  <use href="#dataObject" x="525" y="400" width="32" height="38"/>
  <text class="dataLabel" x="541" y="450" text-anchor="middle">Listing</text>
  <path class="dataAssoc" d="M 541 400 L 541 372"/>
</svg>
